<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hearts Remedy — Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; background: #000; color: #fff; overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      gap: 2.5rem; padding: 1.25rem 2.75rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    }
    .nav-left, .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    nav a {
      color: #b50b88; text-decoration: none;
      font-family: 'Space Grotesk', sans-serif; font-weight: 400;
      font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase;
      transition: text-shadow 0.25s ease;
    }
    nav a:hover { text-shadow: 0 0 8px #C4567A, 0 0 20px #C4567A, 0 0 40px rgba(196,86,122,0.4); }
    nav a.youtube-btn {
      border: 1px solid #b50b88; padding: 0.35rem 1rem; border-radius: 3px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    nav a.youtube-btn:hover { background: #b50b88; color: #fff; text-shadow: none; }
    .discord-open-btn {
      background: none; border: 1px solid #b50b88; color: #b50b88;
      font-family: 'Space Grotesk', sans-serif; font-weight: 400;
      font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.35rem 1rem; cursor: pointer; border-radius: 3px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .discord-open-btn:hover { background: #b50b88; color: #fff; }

    .page-header { padding: 7rem 2.75rem 2.5rem; }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 300;
      color: rgba(255,255,255,0.85); letter-spacing: 0.01em;
    }

    .track-list { padding-bottom: 7rem; }
    .track-row {
      display: flex; align-items: center; gap: 1.25rem;
      padding: 1rem 2.75rem; border-bottom: 1px solid #150015;
      cursor: pointer; transition: background 0.15s ease;
    }
    .track-row:first-child { border-top: 1px solid #150015; }
    .track-row:hover { background: rgba(181,11,136,0.07); }
    .track-row.active { background: rgba(181,11,136,0.11); }

    .track-index {
      font-family: 'Space Grotesk', sans-serif; font-weight: 300;
      font-size: 0.8rem; color: rgba(255,255,255,0.25);
      width: 2.2rem; text-align: right; flex-shrink: 0;
    }
    .track-name {
      flex: 1; font-family: 'Space Grotesk', sans-serif; font-weight: 400;
      font-size: 1rem; color: #fff; letter-spacing: 0.01em;
      transition: color 0.15s ease; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .track-row.active .track-name { color: #b50b88; }

    .sticky-player {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 200;
      background: #0a000a; border-top: 1px solid #250025;
      padding: 0.8rem 2.75rem; display: flex; align-items: center; gap: 1.5rem;
      opacity: 0; pointer-events: none; transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .sticky-player.visible { opacity: 1; pointer-events: all; transform: none; }

    .player-btn {
      flex-shrink: 0; width: 2.1rem; height: 2.1rem; border-radius: 50%;
      background: #b50b88; border: none; color: #fff; font-size: 0.8rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease; padding-left: 2px;
    }
    .player-btn:hover { background: #d40ca1; }

    .player-title {
      font-family: 'Space Grotesk', sans-serif; font-weight: 400;
      font-size: 0.9rem; color: #fff; flex-shrink: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
    }
    .player-progress-wrap { flex: 1; display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .player-time {
      font-family: 'Space Grotesk', sans-serif; font-weight: 300;
      font-size: 0.72rem; color: rgba(255,255,255,0.38); flex-shrink: 0; width: 2.6rem;
    }
    .player-time.total { text-align: right; }
    .progress-bar {
      flex: 1; height: 7px; background: rgba(255,255,255,0.12);
      border-radius: 4px; cursor: pointer; position: relative;
    }
    .progress-fill { height: 100%; background: #b50b88; border-radius: 4px; width: 0%; position: relative; }
    .progress-fill::after {
      content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
      width: 11px; height: 11px; background: #fff; border-radius: 50%;
      opacity: 0; transition: opacity 0.15s;
    }
    .progress-bar:hover .progress-fill::after { opacity: 1; }

    .volume-wrap { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .volume-icon { font-size: 0.85rem; color: rgba(255,255,255,0.4); user-select: none; }
    .volume-slider {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 7px;
      background: rgba(255,255,255,0.12); border-radius: 4px; outline: none; cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: #b50b88; cursor: pointer; transition: background 0.15s;
    }
    .volume-slider::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%; border: none;
      background: #b50b88; cursor: pointer;
    }
    .volume-slider:hover::-webkit-slider-thumb { background: #d40ca1; }
    .volume-slider:hover::-moz-range-thumb { background: #d40ca1; }

    .download-btn {
      flex-shrink: 0; background: none; border: 1px solid rgba(181,11,136,0.5);
      color: rgba(181,11,136,0.8); font-size: 0.8rem; width: 2.1rem; height: 2.1rem;
      border-radius: 3px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .download-btn:hover { background: #b50b88; border-color: #b50b88; color: #fff; }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      position: relative; background: #1a1a1a; border: 1px solid #2e2e2e;
      border-radius: 6px; padding: 2rem; display: flex; align-items: flex-start; gap: 1.5rem;
    }
    .modal-close {
      position: absolute; top: 0.5rem; right: 0.75rem;
      background: none; border: none; color: #666; font-size: 1rem;
      cursor: pointer; transition: color 0.15s;
    }
    .modal-close:hover { color: #fff; }
    .modal-text { font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; color: rgba(255,255,255,0.75); line-height: 1.7; }
    .modal-text a { color: #b50b88; text-decoration: none; }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.25rem; gap: 1rem; }
      .page-header { padding: 5.5rem 1.25rem 2rem; }
      .track-row { padding: 0.85rem 1.25rem; }
      .sticky-player { padding: 0.7rem 1rem; gap: 0.85rem; }
      .player-title { max-width: 120px; font-size: 0.8rem; }
      .player-time { display: none; }
      .volume-wrap { display: none; }
      .modal-box { flex-direction: column; padding: 1.5rem; margin: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html">Home</a>
    <button class="discord-open-btn" id="discord-open-btn">Discord</button>
  </div>
  <div class="nav-right">
    <a href="https://www.youtube.com/channel/UCaXykkxu-LzTpi8L4Brtd_A/" target="_blank" rel="noopener" class="youtube-btn">YouTube</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>here's some of my music to listen to :3</h1>
  </div>
  <div class="track-list" id="track-list"></div>
</main>

<div class="sticky-player" id="sticky-player">
  <button class="player-btn" id="player-btn">▶</button>
  <span class="player-title" id="player-title">—</span>
  <div class="player-progress-wrap">
    <span class="player-time" id="player-current">0:00</span>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="player-time total" id="player-total">0:00</span>
  </div>
  <div class="volume-wrap">
    <span class="volume-icon">🔈</span>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.02" value="1" />
  </div>
  <a class="download-btn" id="download-btn" title="Download">⬇</a>
</div>

<div class="modal-overlay" id="discord-modal">
  <div class="modal-box">
    <button class="modal-close" id="discord-close-btn">✕</button>
    <iframe src="https://discord.com/widget?id=1515543017111687169&theme=dark" width="300" height="400" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
    <div class="modal-text">
      <p>
        Join my Discord! You can see my releases<br />
        and talk to other community members here.<br /><br />
        <a href="https://discord.gg/jfCe8fAq3Y" target="_blank" rel="noopener">
          https://discord.gg/jfCe8fAq3Y
        </a>
      </p>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
  // file is the exact filename inside your /library/ folder in the repo
  const tracks = [
    { title: "Alternia",                                   file: "alternia.mp3" },
    { title: "Annus Mirabilis (Unfinished)",               file: "annus mirabilis unfinished.mp3" },
    { title: "Autumn Swing",                               file: "autumn swing.mp3" },
    { title: "Auxillary",                                  file: "auxillary final upload.ogg" },
    { title: "Butter Dog the Dog with the Butter",         file: "butter dog the dog with the butter.mp3" },
    { title: "Coallesce",                                  file: "coallesce.mp3" },
    { title: "Cut Ties",                                   file: "cut ties.mp3" },
    { title: "Deep",                                       file: "deep.ogg" },
    { title: "Digital Circus Theme but Mario 64",          file: "digital circus theme but mario 64.mp3" },
    { title: "Digital Weeeed",                             file: "digital weeeed.mp3" },
    { title: "Droplet",                                    file: "droplet.mp3" },
    { title: "Drops of Hazel on Your Sea of Dreams",       file: "drops of hazel on your sea of dreams.mp3" },
    { title: "Dusty Circuits",                             file: "dusty circuits.mp3" },
    { title: "Ego Sum Vobis in Terra Mortuorum",           file: "ego sum vobis in terra mortuorum.mp3" },
    { title: "ELLEHK",                                     file: "ELLEHK.mp3" },
    { title: "Endless Light",                              file: "endless light upload.ogg" },
    { title: "Errius Loxvul",                              file: "Errius Loxvul.mp3" },
    { title: "Exile",                                      file: "exile.mp3" },
    { title: "Failed Winter",                              file: "failed winter.mp3" },
    { title: "Find Ur Way",                                file: "find ur way.mp3" },
    { title: "Four Thirty AM in This Dining Room",         file: "four thirty am in this dining room.mp3" },
    { title: "Frostbite",                                  file: "frostbite.mp3" },
    { title: "Gnostic",                                    file: "gnostic final upload.ogg" },
    { title: "Hypnosis",                                   file: "hypnosis.mp3" },
    { title: "Impulse Control",                            file: "impulse control.mp3" },
    { title: "It's Not Deliveryyy",                        file: "its not deliveryyy.mp3" },
    { title: "Kerfur Boss Fight",                          file: "kerfur boss fight.mp3" },
    { title: "Land of Fame and Fortune",                   file: "land of fame and fortune.mp3" },
    { title: "Land of Freedom and Cycles",                 file: "land of freedom and cycles.mp3" },
    { title: "Lullaby for a Goddess",                      file: "lullaby for a goddess.mp3" },
    { title: "Mage of Light",                              file: "Mage of Light.mp3" },
    { title: "Mania",                                      file: "mania but not bad on speakers hopefully.mp3" },
    { title: "Must and Pulse",                             file: "must and pulse.mp3" },
    { title: "Obsidian Oppugnants",                        file: "obsidian oppugnants upload.ogg" },
    { title: "Ocean Hivecraft",                            file: "ocean hivecraft FIXED.mp3" },
    { title: "Oddball",                                    file: "oddball v3.mp3" },
    { title: "Okay Here Forever",                          file: "okay here forever.mp3" },
    { title: "On This Dead Land I'm Here for You",         file: "on this dead land im here for you.mp3" },
    { title: "Onwards",                                    file: "onwards hq.mp3" },
    { title: "Purple Town",                                file: "purpletown fix 2.mp3" },
    { title: "Ragamuffin Rampage",                         file: "ragamuffin rampage.mp3" },
    { title: "Rage Incarnate",                             file: "rage incarnate.mp3" },
    { title: "Renart",                                     file: "renart.mp3" },
    { title: "Sadly It Doesn't Snow in Caves",             file: "sadly it doesnt snow in caves.ogg" },
    { title: "Salami Shop",                                file: "salami shop new.mp3" },
    { title: "Searching (Dry)",                            file: "searching2 (dry).mp3" },
    { title: "Second Dimensional Syntax",                  file: "second dimensional syntax.mp3" },
    { title: "Skaia Perseveres",                           file: "skaia perseveres upload.ogg" },
    { title: "Smoke and Mirrors",                          file: "smoke and mirrors.mp3" },
    { title: "Smoker's Stains",                            file: "smokersstains.mp3" },
    { title: "Solace",                                     file: "solace.mp3" },
    { title: "Starless Skies",                             file: "starless skies.mp3" },
    { title: "The Gift of Flight",                         file: "the gift of flight.mp3" },
    { title: "VHS OVERLAY PNG",                            file: "VHS_OVERLAY_PNG.mp3" },
    { title: "Voidal Sandbox (Remastered)",                file: "voidal sandbox remast.ogg" },
    { title: "Webbish",                                    file: "webbish.mp3" },
    { title: "Well I Mean at Least We're Together Right",  file: "well i mean at least were together right.mp3" },
    { title: "Wispel New Theme",                           file: "Wispel new theme.mp3" },
    { title: "You Live Like This",                         file: "you live like this HQ.mp3" },
  ];

  const audio        = document.getElementById('audio');
  const listEl       = document.getElementById('track-list');
  const playerEl     = document.getElementById('sticky-player');
  const playerBtn    = document.getElementById('player-btn');
  const playerTitle  = document.getElementById('player-title');
  const currentEl    = document.getElementById('player-current');
  const totalEl      = document.getElementById('player-total');
  const fill         = document.getElementById('progress-fill');
  const progressBar  = document.getElementById('progress-bar');

  let currentIndex = null;
  let isPlaying    = false;

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
  }

  function encodeSrc(filename) {
    // encode the filename but keep it as a relative path under library/
    return 'library/' + encodeURIComponent(filename);
  }

  function allRows() { return listEl.querySelectorAll('.track-row'); }

  function setRowActive(i) {
    allRows().forEach((r, ri) => {
      r.classList.toggle('active', ri === i);
      r.querySelector('.track-index').textContent =
        ri === i ? (isPlaying ? '⏸' : '▶') : ri + 1;
    });
  }

  const dlBtn = document.getElementById('download-btn');

  function loadTrack(i) {
    currentIndex        = i;
    audio.src           = encodeSrc(tracks[i].file);
    isPlaying           = true;
    playerBtn.textContent   = '⏸';
    playerTitle.textContent = tracks[i].title;
    playerEl.classList.add('visible');
    dlBtn.href     = encodeSrc(tracks[i].file);
    dlBtn.download = tracks[i].title;
    setRowActive(i);
    audio.play();
  }

  function togglePlay() {
    if (isPlaying) {
      audio.pause(); isPlaying = false; playerBtn.textContent = '▶';
    } else {
      audio.play();  isPlaying = true;  playerBtn.textContent = '⏸';
    }
    if (currentIndex !== null) setRowActive(currentIndex);
  }

  // Build list
  tracks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.innerHTML = `
      <span class="track-index">${i + 1}</span>
      <span class="track-name">${t.title}</span>
    `;
    row.addEventListener('click', () => {
      if (currentIndex === i) { togglePlay(); return; }
      loadTrack(i);
    });
    listEl.appendChild(row);
  });

  playerBtn.addEventListener('click', togglePlay);

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    fill.style.width      = (audio.currentTime / audio.duration * 100) + '%';
    currentEl.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', () => { totalEl.textContent = fmt(audio.duration); });
  audio.addEventListener('ended', () => {
    if (currentIndex < tracks.length - 1) { loadTrack(currentIndex + 1); }
    else { isPlaying = false; playerBtn.textContent = '▶'; setRowActive(currentIndex); }
  });

  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });

  // Volume
  const volSlider = document.getElementById('volume-slider');
  volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });

  // Discord modal
  const modal   = document.getElementById('discord-modal');
  document.getElementById('discord-open-btn').addEventListener('click', () => modal.classList.add('open'));
  document.getElementById('discord-close-btn').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
</script>
</body>
</html>
